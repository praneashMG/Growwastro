<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Groww Astro</title>
<link rel="icon" href="images/logo.jpeg">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

/* Smooth infinite star movement */
@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

/* Floating animation */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Glow effect */
.glow {
  text-shadow: 0 0 10px #FACC15,
               0 0 25px #FACC15,
               0 0 50px #FACC15;
}

/* Star layer FIXED */
.stars {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(#FACC15 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveStars 60s linear infinite;
  opacity: 0.25;
}

/* Prevent scroll glitch */
body {
  overflow: hidden;
}

</style>
</head>

<body class="bg-[#7F1D1D] min-h-screen flex items-center justify-center relative text-white">

<!-- Stars -->
<div class="stars"></div>

<!-- Content -->
<div class="relative z-10 text-center px-6">

  <h1 class="text-7xl sm:text-9xl font-extrabold text-[#FACC15] ">
    404
  </h1>

  <div class="mt-6 animate-[float_4s_ease-in-out_infinite]">
    <i class="bi bi-stars text-5xl text-[#FACC15]"></i>
  </div>

  <h2 class="text-2xl sm:text-3xl font-bold mt-6">
    Oops! You’ve Drifted Off Orbit 
    <i class="bi bi-moon-stars-fill"></i>
  </h2>

  <p class="text-gray-300 mt-4 max-w-md mx-auto">
    The page you’re searching for has vanished into the cosmic void.
    Let’s guide you back to your celestial journey.
  </p>

  <a href="index.html"
     class="inline-block mt-8 bg-[#FACC15] text-[#7F1D1D] 
            px-8 py-3 rounded-full font-bold 
            hover:scale-110 transition duration-300 shadow-lg">
    <i class="bi bi-rocket-takeoff-fill mr-2"></i>
    Return Home
  </a>

</div>

</body>
</html>
